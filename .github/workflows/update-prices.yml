name: update-prices

# Daily commodity/FX refresh for the IDX price-cache.
on:
  schedule:
    - cron: "0 22 * * 1-5"   # 22:00 UTC Mon-Fri (~05:00 WIB next day, after US close)
  workflow_dispatch: {}       # manual "Run workflow" button

permissions:
  contents: write             # allow the workflow to commit updated CSVs

concurrency:
  group: update-prices
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install --quiet "yfinance>=0.2.40"

      - name: Fetch prices
        run: python fetch_prices.py

      - name: Commit if changed
        run: |
          git config user.name  "prices-bot"
          git config user.email "prices-bot@users.noreply.github.com"
          git add price-cache/*.csv
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "prices: $(date -u +%Y-%m-%d)"
            git push
          fi
